<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDM Nacional Vision One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            color: #333;
        }

        .navbar {
            background: linear-gradient(90deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 20px 30px;
            border-bottom: 3px solid #D4AF37;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .navbar-brand span {
            color: #D4AF37;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #D4AF37;
            text-align: center;
        }

        .header h1 {
            color: #1a1a1a;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 13px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .filters-title {
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            color: #1a1a1a;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .filter-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #D4AF37;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: white;
            border: 2px solid #D4AF37;
        }

        .btn-secondary {
            background: white;
            color: #1a1a1a;
            border: 2px solid #D4AF37;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-top: 4px solid #D4AF37;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: #1a1a1a;
        }

        .stat-label {
            color: #999;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
        }

        .actions-title {
            color: white;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .actions-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid #D4AF37;
        }

        .action-id {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 8px;
            margin-right: 8px;
        }

        .action-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-nao-iniciado {
            background: rgba(255, 192, 0, 0.2);
            color: #856404;
        }

        .status-em-andamento {
            background: rgba(68, 114, 196, 0.2);
            color: #0C5460;
        }

        .status-concluido {
            background: rgba(112, 173, 71, 0.2);
            color: #155724;
        }

        .action-title {
            color: #1a1a1a;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .action-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 11px;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
        }

        .info-label {
            color: #999;
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            margin-top: 3px;
        }

        .priority-alta {
            color: #C55A11;
        }

        .priority-media {
            color: #FFC000;
        }

        .priority-baixa {
            color: #70AD47;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 11px;
            margin-top: 30px;
            border-top: 2px solid #D4AF37;
        }

        .success-message {
            background: rgba(112, 173, 71, 0.2);
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #70AD47;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand"><span>📊</span> PDM Nacional Vision One</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>PDM Nacional Vision One</h1>
            <p>Plano de Desenvolvimento Médico — Versão Standalone</p>
        </div>

        <div class="success-message">
            ✅ Dashboard carregado com sucesso!
        </div>

        <div class="filters">
            <div class="filters-title">🔍 Filtros</div>
            
            <div class="filter-group">
                <label>Unidade</label>
                <select id="filterUnidade" onchange="atualizarMedicos()">
                    <option value="">-- Selecione a Unidade --</option>
                    <option value="CBV">CBV - DF (7 médicos)</option>
                    <option value="HOPE">HOPE - PE (14 médicos)</option>
                    <option value="HRO">HRO - MA (5 médicos)</option>
                    <option value="SANTA LUZIA">Santa Lúzia - PE (3 médicos)</option>
                    <option value="V1 SP">V1 SP - SP (6 médicos)</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Médico</label>
                <select id="filterMedico">
                    <option value="">-- Selecione o Médico --</option>
                </select>
            </div>

            <div class="filter-buttons">
                <button class="btn btn-primary" onclick="filtrar()">🔍 Filtrar</button>
                <button class="btn btn-secondary" onclick="limpar()">↻ Limpar</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalAcoes">7</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="exibindo">0</div>
                <div class="stat-label">Exibindo</div>
            </div>
        </div>

        <div class="actions-title">📋 Ações</div>
        <div class="actions-grid" id="acoesContainer">
            <div class="empty-state">👇 Selecione um médico para ver as ações</div>
        </div>
    </div>

    <div class="footer">
        <div style="color: #D4AF37; font-weight: 700;">PDM Nacional Vision One</div>
        <p>Plano de Desenvolvimento Médico 2026</p>
    </div>

    <script>
        const medicosPorUnidade = {
            "CBV": ["Dr. Diego Leite", "Dr. Fernando Betty", "Dr. Ibraim Viana", "Dr. Juscelino Kubitschek", "Dr. Tauan Oliveira", "Dra. Camila Guimarães", "Dra. Maria Regina Chalita"],
            "HOPE": ["Dr. Bernardo Cavalcanti", "Dr. Edilana", "Dr. John Holanda", "Dr. Kaio Soares", "Dr. Manoel", "Dr. Michell Bittencout", "Dr. Renato Lira", "Dr. Samira Cavalcanti", "Dr. Vasco Filho", "Dra. Arielle", "Dra. Bruna Ventura", "Dra. Daniela Raposo", "Dra. Edillana", "Dra. Michele"],
            "HRO": ["Dr. Guilherme Palácio", "Dr. Solon Bastos", "Dra. Jennifer Carvalho", "Dra. Maria Eduarda", "Dra. Samira Cutrim"],
            "SANTA LUZIA": ["Dr. Natanael Figueiroa", "Dra. Elisa Martins", "Dra. Hayanna Rangel"],
            "V1 SP": ["Dr. Eduardo Parente", "Dr. Mikael Chun", "Dr. Moacyr Campos", "Dr. Ramon Oliveira", "Dra. Talita Araujo", "Dra. Thayana Darab"]
        };

        const allAcoes = [
            {"id": "ACAO-001", "unidade": "HOPE", "medico": "Dr. Manoel", "acao": "Estruturar estratégia específica para pacientes Unimed glaucoma", "responsavel": "Operações / Médico", "prioridade": "Média", "status": "Não iniciado"},
            {"id": "ACAO-002", "unidade": "HOPE", "medico": "Dr. Manoel", "acao": "Revisar configuração da agenda mista", "responsavel": "Operações", "prioridade": "Alta", "status": "Não iniciado"},
            {"id": "ACAO-003", "unidade": "HOPE", "medico": "Dr. Manoel", "acao": "Criar perfil de pacientes 50+", "responsavel": "Call Center / Operações", "prioridade": "Média", "status": "Não iniciado"},
            {"id": "ACAO-004", "unidade": "CBV", "medico": "Dr. Diego Leite", "acao": "Estruturação de agenda de Plástica Ocular", "responsavel": "Operações", "prioridade": "Alta", "status": "Não iniciado"},
            {"id": "ACAO-005", "unidade": "V1 SP", "medico": "Dr. Moacyr Campos", "acao": "Implementar novo script de telefonia", "responsavel": "Call Center", "prioridade": "Alta", "status": "Concluído"},
            {"id": "ACAO-006", "unidade": "HRO", "medico": "Dr. Guilherme Palácio", "acao": "Definir cronograma de cirurgias", "responsavel": "Operações", "prioridade": "Alta", "status": "Em andamento"},
            {"id": "ACAO-007", "unidade": "SANTA LUZIA", "medico": "Dra. Elisa Martins", "acao": "Revisar protocolos de atendimento", "responsavel": "Médico", "prioridade": "Média", "status": "Não iniciado"}
        ];

        let acoesFiltradas = [];

        function atualizarMedicos() {
            const unidade = document.getElementById('filterUnidade').value;
            const selectMedico = document.getElementById('filterMedico');
            selectMedico.innerHTML = '<option value="">-- Selecione o Médico --</option>';
            
            if (unidade && medicosPorUnidade[unidade]) {
                const medicos = medicosPorUnidade[unidade].sort();
                medicos.forEach(med => {
                    const opt = document.createElement('option');
                    opt.value = med;
                    opt.textContent = med;
                    selectMedico.appendChild(opt);
                });
            }
        }

        function filtrar() {
            const medico = document.getElementById('filterMedico').value;
            const unidade = document.getElementById('filterUnidade').value;

            if (!medico) {
                alert('⚠️ Selecione um médico!');
                return;
            }

            acoesFiltradas = allAcoes.filter(acao => 
                acao.medico === medico && acao.unidade === unidade
            );

            document.getElementById('exibindo').textContent = acoesFiltradas.length;
            renderizar();
        }

        function limpar() {
            document.getElementById('filterUnidade').value = '';
            document.getElementById('filterMedico').value = '';
            acoesFiltradas = [];
            document.getElementById('exibindo').textContent = '0';
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('acoesContainer');

            if (acoesFiltradas.length === 0) {
                container.innerHTML = '<div class="empty-state">👇 Selecione um médico para ver as ações</div>';
                return;
            }

            container.innerHTML = acoesFiltradas.map(acao => {
                const statusClass = 'status-' + acao.status.toLowerCase().replace(/\s/g, '-');
                const priorityClass = 'priority-' + acao.prioridade.toLowerCase();
                
                return `
                    <div class="action-card">
                        <div>
                            <span class="action-id">${acao.id}</span>
                            <span class="action-status ${statusClass}">${acao.status}</span>
                        </div>
                        <div class="action-title">${acao.acao}</div>
                        <div class="action-info">
                            <div>
                                <div class="info-label">Responsável</div>
                                <div class="info-value">${acao.responsavel}</div>
                            </div>
                            <div>
                                <div class="info-label">Prioridade</div>
                                <div class="info-value ${priorityClass}">${acao.prioridade}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        console.log('✅ Dashboard PDM carregado com sucesso!');
    </script>
</body>
</html>
